# Data path configuration for ForestFormer3D
# Adjust PROJECT_ROOT to match your deployment

project_root: "${HOME}/forest_radio_deployment"

# Raw data (downloaded from Zenodo)
raw_data:
  train_val_data: "${project_root}/data/raw/for_instance_v2/train_val_data"
  test_data: "${project_root}/data/raw/for_instance_v2/test_data"
  pretrained_weights: "${project_root}/data/raw/for_instance_v2/forestformer_code/clean_forestformer/epoch_3000_fix.pth"

# ForestFormer3D expected paths (symlinks)
forestformer:
  repo: "${project_root}/external/ForestFormer3D"
  train_val_data: "${forestformer.repo}/data/ForAINetV2/train_val_data"
  test_data: "${forestformer.repo}/data/ForAINetV2/test_data"
  meta_data: "${forestformer.repo}/data/ForAINetV2/meta_data"
  pretrained_weights: "${forestformer.repo}/work_dirs/clean_forestformer/epoch_3000_fix.pth"

# Intermediate data (generated by preprocessing)
intermediate:
  instance_data: "${forestformer.repo}/data/ForAINetV2/forainetv2_instance_data"
  points: "${forestformer.repo}/data/ForAINetV2/points"
  instance_mask: "${forestformer.repo}/data/ForAINetV2/instance_mask"
  semantic_mask: "${forestformer.repo}/data/ForAINetV2/semantic_mask"
  info_pkls: "${forestformer.repo}/data/ForAINetV2/forainetv2_oneformer3d_infos_*.pkl"

# Symlink commands (run on Linux GPU host)
setup_symlinks: |
  PROJECT_ROOT="${HOME}/forest_radio_deployment"
  FF3D="${PROJECT_ROOT}/external/ForestFormer3D"

  ln -sfn "${PROJECT_ROOT}/data/raw/for_instance_v2/train_val_data" "${FF3D}/data/ForAINetV2/train_val_data"
  ln -sfn "${PROJECT_ROOT}/data/raw/for_instance_v2/test_data" "${FF3D}/data/ForAINetV2/test_data"

  mkdir -p "${FF3D}/work_dirs/clean_forestformer"
  ln -sfn "${PROJECT_ROOT}/data/raw/for_instance_v2/forestformer_code/clean_forestformer/epoch_3000_fix.pth" \
    "${FF3D}/work_dirs/clean_forestformer/epoch_3000_fix.pth"
